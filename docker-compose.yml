services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cloudpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudpulse
      POSTGRES_PASSWORD: cloudpulse
      POSTGRES_DB: cloudpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cloudpulse-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://cloudpulse:cloudpulse@db:5432/cloudpulse
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: