name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend tests (pytest + real Postgres/pgvector)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cloudpulse
          POSTGRES_PASSWORD: cloudpulse
          POSTGRES_DB: cloudpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudpulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://cloudpulse:cloudpulse@localhost:5432/cloudpulse
      ENVIRONMENT: test
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      CHAT_MODEL: google/flan-t5-base
      SLACK_WEBHOOK_URL: ""
      JWT_SECRET_KEY: ci-test-secret-not-for-prod
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 10080
      APP_ENCRYPTION_KEY: HicjRZLuUYNG8mY1YeYDN5WbfeESSC5ovmp793lVLrU=

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-v1

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations against real Postgres
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -v

  frontend-build:
    name: Frontend type-check + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        # package-lock.json is generated on whatever machine last ran `npm install`
        # locally (a Mac, in this project's case). Rollup ships OS/arch-specific
        # optional binaries, and npm has a long-standing bug (npm/cli#4828) where a
        # lockfile resolved on one platform can omit the binary another platform
        # needs, so `npm install`/`npm ci` fails on CI with "Cannot find module
        # @rollup/rollup-linux-x64-gnu". Deleting the lockfile here forces npm to
        # resolve dependencies fresh against the runner's actual platform every
        # time, which sidesteps the bug entirely. The committed lockfile is still
        # used for local dev and Docker builds, where this hasn't been an issue.
        run: |
          rm -f package-lock.json
          npm install

      - name: Type-check and build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: cloudpulse-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: cloudpulse-frontend:ci
